version: "3.8"

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ai_hubs_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_123}
      MYSQL_DATABASE: ai_hubs
      MYSQL_USER: ai_hubs
      MYSQL_PASSWORD: ${DB_PASSWORD:-ai_hubs_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pass_123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # AI Hubs 应用
  ai_hubs:
    build: .
    container_name: ai_hubs_app
    ports:
      - "8080:8080"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=ai_hubs
      - DB_PASSWORD=${DB_PASSWORD:-ai_hubs_pass}
      - DB_NAME=ai_hubs
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-ai-hubs-enterprise-secret}
      - JWT_EXPIRE_MINUTES=480
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
