# AI Hubs v4.0 配置
# 环境变量可覆盖（前缀 AIHUBS_，双下划线分隔层级，如 AIHUBS_AUTH__JWT_SECRET）

server:
  host: 127.0.0.1
  port: 8080

database:
  # 设为 true 强制 SQLite（桌面端/本地开发零配置）
  force_sqlite: true
  mysql:
    host: 127.0.0.1
    port: 3306
    user: ai_hubs
    password: ""           # 留空则自动回退 SQLite；填入密码则尝试 MySQL
    database: ai_hubs
  sqlite_path: data/ai_hubs.db

auth:
  jwt_secret: "ai-hubs-v4-secret-change-in-production"
  jwt_expire_hours: 24
  default_admin_username: admin
  default_admin_password: admin123

email:
  smtp_host: smtp.qq.com
  smtp_port: 465
  sender: 3526145827@qq.com
  password: jnaoofgohquidbed
  code_expire_minutes: 5

llm:
  default_provider: deepseek
  default_model: deepseek-chat
