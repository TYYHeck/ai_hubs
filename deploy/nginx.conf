# ============================================
# AI Hubs Nginx 配置 (React 前端 + 后端 API 反代)
# ============================================
#
# 部署步骤:
#   1. sudo cp deploy/nginx.conf /etc/nginx/sites-available/ai_hubs
#   2. sudo ln -s /etc/nginx/sites-available/ai_hubs /etc/nginx/sites-enabled/
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx
#
# 说明:
#   - 前端静态文件由 Nginx 直接托管 (frontend/dist)
#   - /api、/ws、/health、/metrics 反向代理到后端 (127.0.0.1:8080)
#   - 若需 HTTPS，参考底部注释用 certbot 签发证书后启用 443 块

upstream ai_hubs_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # 部署到 IP 时使用 _；若绑定域名改为 your-domain.com

    # 日志
    access_log /var/log/nginx/ai_hubs_access.log;
    error_log  /var/log/nginx/ai_hubs_error.log;

    # 文件上传限制 (数据集/技能导入)
    client_max_body_size 50m;
    client_body_timeout 120s;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/markdown;
    gzip_min_length 1000;

    # ── 前端静态资源 (React SPA) ──
    location / {
        root /var/www/ai_hubs/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 静态资源缓存
    location /assets/ {
        root /var/www/ai_hubs/dist;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── 健康检查 + 指标 ──
    location /health {
        proxy_pass http://ai_hubs_backend;
        proxy_set_header Host $host;
    }

    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://ai_hubs_backend;
        proxy_set_header Host $host;
    }

    # ── WebSocket 实时同步 ──
    location /ws {
        proxy_pass http://ai_hubs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── SSE 流式对话 (不缓冲) ──
    location /api/chat {
        proxy_pass http://ai_hubs_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── 其余 API ──
    location /api/ {
        proxy_pass http://ai_hubs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

